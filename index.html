<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDERIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles\stylelogin.css">
</head>

<body>
    <div class="contenedor">
        <div class="login-box">
            <div class="circulo circulo1"></div>
            <div class="circulo circulo2"></div>
            <div class="logo">
                <img id="logo1" src="img\logo.png" alt="logo">
            </div>
            <div class="titulo">
                ORDERIX
            </div>

            <div class="subtitulo">
                Order Management System
            </div>

            <div class="formulario">
                <div class="texto">
                    Usuario
                </div>

                <div>
                    <input type="text" placeholder="Ingrese su usuario" class="input">
                </div>
            </div>

            <div class="formulario">
                <div class="texto">
                    Contraseña
                </div>

                <div>
                    <input type="password" placeholder="Ingrese su contraseña" class="input">
                </div>

                <div>
                    <button class="boton">Ingresar</button>
                </div>

            </div>

            <div class="footer">Acceso rápido para meseros</div>

        </div>

    </div>

</body>

</html>
